services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - data:/data
    depends_on:
      - database
    restart: unless-stopped

  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-mailgun_proxy}
      POSTGRES_USER: ${DB_USERNAME:-mailgun_proxy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  data:
  postgres:
